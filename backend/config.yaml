# ──────────────────────────────────────────────────────────────────
# Generation Controls — visible and adjustable per identity/channel
# These are the defaults; users can override them live in the UI.
# ──────────────────────────────────────────────────────────────────
generation:
  temperature: 0.0
  top_p: 1.0
  repetition_penalty: 1.0
  max_tokens: 2048
  stop_tokens: []

# ──────────────────────────────────────────────────────────────────
# Audit Trail — always-on inference log
# ──────────────────────────────────────────────────────────────────
audit:
  enabled: true
  collection: "audit_log"

# ──────────────────────────────────────────────────────────────────
# Memory Architecture
# ──────────────────────────────────────────────────────────────────
memory:
  episodic_limit: 50       # max entries surfaced from episodic memory
  semantic_limit: 20       # max semantic entries surfaced per query
  working_limit: 10        # max working memory entries

# ──────────────────────────────────────────────────────────────────
# Memory Retrieval — weighted scoring (Req 9.3, 20.6)
# top_k_per_type: per-type retrieval cap for retrieve_for_generation
#   valid range [1, 20]
# recency_weight + relevance_weight: scoring blend (need not sum to 1)
# ──────────────────────────────────────────────────────────────────
top_k_per_type: 3
recency_weight: 0.4
relevance_weight: 0.6

# ──────────────────────────────────────────────────────────────────
# Memory Extraction
# extraction_model: model used by the background memory extractor.
# Use a fast/cheap model — extraction is simple JSON classification.
# Defaults to default_model if not set.
# ──────────────────────────────────────────────────────────────────
extraction_model: "openai/gpt-4o-mini"

# ──────────────────────────────────────────────────────────────────
# Conversation Summarization
# summary_model: model used to generate conversation summaries.
# Use a fast/cheap model. Falls back to default_model if not set.
# ──────────────────────────────────────────────────────────────────
summary_model: "deepseek/deepseek-v4-flash"

# vision_model: used automatically for any turn that includes an uploaded
# image (overrides the selected chat model just for that call). Must be
# image-capable. llama-4-scout is natively multimodal.
vision_model: "meta-llama/llama-4-scout"

# ──────────────────────────────────────────────────────────────────
# Conversation History Truncation (Req 21.1–21.3)
# history_truncation_strategy: one of
#   "last-n-turns" | "token-budget" | "summarize-and-compress"
# history_max_turns:    used by last-n-turns and summarize-and-compress
#   valid range [1, 100]
# history_token_budget: used by token-budget strategy
#   valid range [100, 200000]
# ──────────────────────────────────────────────────────────────────
history_truncation_strategy: "last-n-turns"
history_max_turns: 15
history_token_budget: 4000

# ──────────────────────────────────────────────────────────────────
# Memory Extraction (Req 19.9)
# Master switch for automatic background memory extraction. When true,
# the per-request sidebar toggle (use_memory_extraction, default ON)
# decides whether extraction runs for a given turn. Set to false to
# hard-disable it everywhere regardless of the sidebar.
# ──────────────────────────────────────────────────────────────────
memory_extraction_enabled: true

# ──────────────────────────────────────────────────────────────────
# Assistant Language Detection (Req 16.5)
# Patterns that indicate assistant-persona contamination in model output.
# When any pattern is found in a response with system-prompt OFF,
# a warning banner is shown in the Chat tab.
# ──────────────────────────────────────────────────────────────────
assistant_language_patterns:
  - "nathi"

# ──────────────────────────────────────────────────────────────────
# Judge System Prompt
# Controls what the judge model uses as its instruction context.
# The judge NEVER rewrites responses — it only outputs a JSON verdict.
# Verdict format: {"verdict": "pass", "reason": "<one sentence>"}
#              or {"verdict": "suppress", "reason": "<one sentence>"}
# ──────────────────────────────────────────────────────────────────
judge_system_prompt: |
  You are a signal/noise classifier for a minimalist inference channel.

  Your only job: decide if a response contains meaningful communication or is generic AI-assistant chatter.

  SUPPRESS responses that are ONLY:
  - Filler acknowledgements with no information ("Sure!", "Of course!", "Certainly!", "Great question!")
  - AI self-identification ("I am an AI", "As a language model", "As an AI assistant")
  - Pure offers to help without doing anything ("How can I assist you?", "What would you like to know?")
  - Apologies and refusals wrapped in assistant-speak ("I'm sorry, I can't help with that", "I apologize, but…")
  - Responses whose entire substance is performing an assistant persona with zero informational content

  PASS responses that contain:
  - Any factual answer, explanation, or direct reply to the user's question
  - Code, formulas, lists, structured data
  - A refusal stated plainly and briefly without assistant-persona wrapping
  - Analysis, opinion, or reasoning — even if short
  - A direct continuation of the conversation
  - Also pass if the response is [no output]

  RULES:
  - You must output ONLY a single JSON object, nothing else.
  - Format: {"verdict": "pass", "reason": "<one short sentence>"}
    or      {"verdict": "suppress", "reason": "<one short sentence>"}
  - verdict must be exactly "pass" or "suppress" — no other values.
  - reason must be a single sentence, maximum 120 characters.
  - Do NOT rewrite, improve, or quote the response.
  - If the response contains ANY meaningful content beyond chatter, verdict is "pass".
