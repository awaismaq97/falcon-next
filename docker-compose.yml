# Full-stack Falcon via Docker — for local end-to-end testing of the exact
# production images, and as a DigitalOcean Droplet deployment path.
#
# nginx mirrors App Platform's ingress: /api → backend, everything else →
# frontend, all on one origin (http://localhost:8080) so the frontend's
# relative /api calls work with zero CORS config.
#
#   docker compose up --build
#   open http://localhost:8080
#
# Secrets are read from ./.env (OPENROUTER_API_KEY, MONGODB_URI, NASA_API_KEY,
# WEATHERAPI_KEY).

services:
  backend:
    build:
      context: ./backend
    env_file:
      - ./.env
    environment:
      PORT: "8080"
      CORS_ORIGINS: "*"
    expose:
      - "8080"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        # Relative /api — routed to the backend by nginx below.
        NEXT_PUBLIC_API_BASE: ""
    environment:
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
    expose:
      - "3000"
    depends_on:
      - backend
    restart: unless-stopped

  proxy:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
