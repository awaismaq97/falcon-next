events {}

http {
  # Falcon reverse proxy — mirrors DigitalOcean App Platform ingress:
  #   /api/*   → FastAPI backend (SSE streaming preserved)
  #   /health  → FastAPI backend (health probe)
  #   /*       → Next.js frontend

  upstream falcon_api { server backend:8080; }
  upstream falcon_web { server frontend:3000; }

  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
  }

  server {
    listen 80;
    client_max_body_size 20m;   # room for base64 image uploads on chat turns

    # ── API (streaming-safe) ──
    location /api/ {
      proxy_pass http://falcon_api;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      # Server-Sent Events: never buffer, keep the connection open long.
      proxy_set_header Connection '';
      proxy_buffering off;
      proxy_cache off;
      chunked_transfer_encoding off;
      proxy_read_timeout 3600s;
      proxy_send_timeout 3600s;
    }

    location = /health {
      proxy_pass http://falcon_api;
    }

    # ── Frontend (Next.js, incl. HMR websocket in dev) ──
    location / {
      proxy_pass http://falcon_web;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_read_timeout 300s;
    }
  }
}
